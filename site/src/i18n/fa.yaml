head:
  title: رزومه مارک‌داون - ابزار رایگان آنلاین ساخت رزومه با مارک‌داون
  desc: ابزار رایگان آنلاین ساخت رزومه، رزومه خود را در چند دقیقه با مارک‌داون بسازید!
  keywords: رزومه ساز, ساخت رزومه, رزومه مارک‌داون, ساخت CV, رزومه آنلاین

landing:
  hero: رزومه خود را با <span text-brand>مارک‌داون</span> بنویسید!
  desc: یک ابزار رایگان و متن‌باز است که برای ساخت و مدیریت رزومه شما به ساده‌ترین شکل ممکن ایجاد شده، بدون از دست دادن حریم خصوصی داده‌هایتان.
  start: ساخت رزومه من
  feats:
    - title: ساده و قدرتمند
      items: مدیریت چندین رزومه<br>پیش‌نمایش بلادرنگ<br>خروجی PDF<br>کاملاً قابل سفارشی‌سازی<br>انتخاب فونت و افزودن آیکون<br>و <a href="https://github.com/junian/markdown-resume#features" target="_blank">امکانات بیشتر</a>
    - title: حریم خصوصی در اولویت
      items: متن‌باز و رایگان<br>داده‌ها به صورت محلی ذخیره می‌شوند<br>بدون نیاز به ورود یا ثبت‌نام<br>بدون ردیابی کاربر<br>بدون تبلیغات

